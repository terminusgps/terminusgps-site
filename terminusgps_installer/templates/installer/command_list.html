{% extends "terminusgps/layout.html" %}
{% partialdef main %}
{% for cmd in commands %}
<form hx-post="{% url 'installer:execute command' unit_id %}" hx-target="this" hx-indicator="#command_{{ forloop.counter0 }}_indicator">
    {% csrf_token %}
    <div class="relative">
        <div class="w-full flex gap-2 items-center">
            <input class="peer p-2 border bg-stone-50 rounded w-full border-stone-600 dark:bg-gray-400" id="id_command_name" name="command_name" type="text" value="{{ cmd.n }}" readonly>
            <button type="submit" class="flex items-center p-2 rounded-full bg-blue-300 border border-blue-600 transition-colors ease-in-out duration-300 hover:cursor-pointer hover:bg-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 fill-gray-100 text-gray-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
                <span class="sr-only">Queue Command</span>
            </button>
        </div>
        <div id="command_{{ forloop.counter0 }}_indicator" class="absolute inset-0 flex items-center p-2 gap-2 bg-gray-400 rounded select-none htmx-indicator border border-stone-600 pointer-events-none text-gray-700">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 animate-spin">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            <p>Queuing...</p>
        </div>
    </div>
</form>
{% endfor %}
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
