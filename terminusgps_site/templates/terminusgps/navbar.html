{% extends "terminusgps/layout.html" %}
{% load static %}
{% partialdef main %}
<nav class="flex justify-between bg-stone-100 text-gray-800 drop-shadow dark:bg-gray-800 print:hidden">
    <a href="{% url 'home' %}" class="group flex items-center space-x-1">
        <img src="{% static 'terminusgps/icon/logo-waypoint.svg' %}" class="animate-coin-slow size-16 group-hover:animate-none"/>
        <img src="{% static 'terminusgps/icon/logo-text.svg' %}" class="size-24 hidden md:flex"/>
    </a>
    <div class="mx-4 flex gap-2 items-center">
        <a href="{% url 'platform' %}" hx-boost="false" rel="nofollow">
            <div class="flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-50 dark:bg-gray-600 dark:border-stone-200 dark:text-gray-100 dark:hover:bg-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m6.115 5.19.319 1.913A6 6 0 0 0 8.11 10.36L9.75 12l-.387.775c-.217.433-.132.956.21 1.298l1.348 1.348c.21.21.329.497.329.795v1.089c0 .426.24.815.622 1.006l.153.076c.433.217.956.132 1.298-.21l.723-.723a8.7 8.7 0 0 0 2.288-4.042 1.087 1.087 0 0 0-.358-1.099l-1.33-1.108c-.251-.21-.582-.299-.905-.245l-1.17.195a1.125 1.125 0 0 1-.98-.314l-.295-.295a1.125 1.125 0 0 1 0-1.591l.13-.132a1.125 1.125 0 0 1 1.3-.21l.603.302a.809.809 0 0 0 1.086-1.086L14.25 7.5l1.256-.837a4.5 4.5 0 0 0 1.528-1.732l.146-.292M6.115 5.19A9 9 0 1 0 17.18 4.64M6.115 5.19A8.965 8.965 0 0 1 12 3c1.929 0 3.716.607 5.18 1.64" />
                </svg>
                <p>Platform</p>
            </div>
        </a>
        {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" hx-boost="true" hx-confirm="Are you sure you want to logout?">
            {% csrf_token %}
            <button type="submit" class="cursor-pointer flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-50 dark:bg-gray-600 dark:border-stone-200 dark:text-gray-100 dark:hover:bg-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                </svg>
                <p>Logout</p>
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">
            <div class="flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-50 dark:bg-gray-600 dark:border-stone-200 dark:text-gray-100 dark:hover:bg-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                </svg>
                <p>Login</p>
            </div>
        </a>
        {% endif %}
    </div>
</nav>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
