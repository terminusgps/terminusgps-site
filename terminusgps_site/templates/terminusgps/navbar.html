{% extends "terminusgps/layout.html" %}
{% load static %}
{% partialdef main %}
<nav class="flex justify-between bg-stone-100 text-gray-800 drop-shadow dark:bg-gray-800 print:hidden">
    <a href="{% url 'home' %}" class="group flex items-center space-x-1">
        <img src="{% static 'terminusgps/icon/logo-waypoint.svg' %}" class="animate-coin-slow size-16 group-hover:animate-none"/>
        <img src="{% static 'terminusgps/icon/logo-text.svg' %}" class="size-24 hidden md:flex"/>
    </a>
    <div class="mx-4 flex gap-2 items-center">
        <a href="{% url 'platform' %}" hx-boost="false" rel="nofollow">
            <div class="flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
                <p>Platform</p>
            </div>
        </a>
        {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" hx-boost="true" hx-confirm="Are you sure you want to logout?">
            {% csrf_token %}
            <button type="submit" class="flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 cursor-pointer hover:bg-stone-50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
                </svg>
                <p>Logout</p>
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">
            <div class="flex font-semibold items-center gap-2 p-2 border-2 rounded bg-stone-200 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                </svg>
                <p>Login</p>
            </div>
        </a>
        {% endif %}
    </div>
</nav>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
